# Example runtime-customized Klangk deployment.
#
# Uses the stock image with runtime customization (branding, legal links,
# email templates, CA certs, OIDC login hooks — no rebuild). The only thing
# that needs a rebuild is features; for a feature build, fork the repo and edit
# the checked-in features.yaml (see docs/deployment/customizing.md).
#
# Before first run:
#   1. Ensure data/ and mount/ are writable by the container. Both ship
#      empty via .gitkeep, but compose mounts them with
#      create_host_path: false, so they must already exist AND be owned by
#      UID/GID 1000:1000 (the `klangk` container user):
#        chown -R 1000:1000 data mount

services:
  klangk:
    # Stock host image — runtime customization only (no rebuild).
    # If you fork the repo and build a feature image, point this at your
    # image (e.g. ghcr.io/<your-org>/klangk-host:latest).
    image: ghcr.io/mcdonc/klangk/klangk-host:latest
    ports:
      - "8997:8997"
    devices:
      - /dev/net/tun
      - /dev/fuse
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
      - label=disable
      - systempaths=unconfined
    cap_add:
      - SYS_ADMIN
    environment:
      # --- Core ---
      KLANGKD_PORT: "8997"
      KLANGKD_EGRESS_PORT: "8995"
      KLANGKD_DEFAULT_USER: "admin@example.com"
      KLANGKD_DEFAULT_PASSWORD: "admin"
      KLANGKD_JWT_SECRET: "${KLANGKD_JWT_SECRET}"
      KLANGKD_PREVENT_INSECURE_JWT_SECRET: "1"
      KLANGKD_DATA_DIR: /home/klangk/data

      # --- Customization directory (runtime, no rebuild) ---
      # Single directory for branding, certs, and email templates.
      # Subdirectories: branding/, certs/, email-templates/
      KLANGKD_CUSTOMIZE_DIR: /home/klangk/custom

      # --- Branding (runtime, no rebuild) ---
      # Product name across the tab title, app-bar wordmark, and emails.
      # KLANGKD_PRODUCT_NAME: "Acme Labs"
      # Serve the logo from branding/logo.png (place in custom/branding/):
      KLANGKD_LOGO_URL: "/branding/logo.png"
      # KLANGKD_BRAND_COLOR: "#E65100"

      # --- Legal & support links (runtime, no rebuild) ---
      # KLANGKD_TERMS_URL: "https://example.com/terms"
      # KLANGKD_PRIVACY_URL: "https://example.com/privacy"
      # KLANGKD_AUP_URL: "https://example.com/aup"
      # KLANGKD_SUPPORT_URL: "https://example.com/support"
      # KLANGKD_SUPPORT_EMAIL: "support@example.com"

      # --- Email customization (runtime, no rebuild) ---
      # Place templates in custom/email-templates/ (see docs)
      # KLANGKD_SMTP_REPLY_TO: "support@example.com"
      # KLANGKD_SMTP_HOST: "${KLANGKD_SMTP_HOST}"
      # KLANGKD_SMTP_USER: "${KLANGKD_SMTP_USER}"
      # KLANGKD_SMTP_PASSWORD: "${KLANGKD_SMTP_PASSWORD}"
      # KLANGKD_SMTP_FROM: "${KLANGKD_SMTP_FROM}"

      # --- Custom CA certs (runtime, no rebuild) ---
      # Place *.pem/*.crt files in custom/certs/ — trusted for outbound TLS
      # (OIDC, SMTP, LLM). Resolved via KLANGKD_CUSTOMIZE_DIR/certs/.

      # --- OIDC (runtime, no rebuild) ---
      # Uncomment to enable. Edit custom/oidc/oidc.yaml with your provider details.
      # KLANGKD_OIDC_CONFIG: /home/klangk/custom/oidc/oidc.yaml
      # KLANGKD_AUTH_MODES: "both"
      # KLANGKD_OIDC_LOGIN_HOOK: /home/klangk/custom/oidc/login_hook.py

      # --- LLM ---
      KLANGKD_LLM_BASE_URL: "${KLANGKD_LLM_BASE_URL}"
      KLANGKD_LLM_API_KEY: "${KLANGKD_LLM_API_KEY}"
      KLANGKD_LLM_MODEL: "${KLANGKD_LLM_MODEL}"

      # --- Observability ---
      LOGFIRE_BASE_URL: "${LOGFIRE_BASE_URL}"
      LOGFIRE_TOKEN: "${LOGFIRE_TOKEN}"
      LOGFIRE_ENVIRONMENT: "${LOGFIRE_ENVIRONMENT}"

      # --- Other ---
      # KLANGKD_DISABLE_REGISTRATION: "1"
      # KLANGKD_DNS_SERVERS: "100.100.100.100,8.8.8.8"
      KLANGKD_ALLOWED_MOUNT_ROOTS: "/home/klangk/mount"

    volumes:
      # Data volume (must exist, owned by 1000:1000):
      - type: bind
        source: ./data
        target: /home/klangk/data
        bind:
          create_host_path: false
      # Mount directory for workspace bind mounts (must exist, owned by 1000:1000):
      - type: bind
        source: ./mount
        target: /home/klangk/mount
        bind:
          create_host_path: false
      # Customization directory — branding/, certs/, email-templates/, oidc/ subdirs:
      - ./custom:/home/klangk/custom:ro
