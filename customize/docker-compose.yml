# Example runtime-customized Klangk deployment.
#
# Uses a custom image built with plugins (see build/build.sh). Most runtime
# customization — branding, legal links, email templates, CA certs, OIDC login
# hooks — is done via env vars and bind mounts (no rebuild). The only thing
# that needs a rebuild is plugins.
#
# Before first run:
#   1. Build the image:  ./build/build.sh
#   2. Ensure data/ and mount/ are writable by the container. Both ship
#      empty via .gitkeep, but compose mounts them with
#      create_host_path: false, so they must already exist AND be owned by
#      UID/GID 1000:1000 (the `klangk` container user):
#        chown -R 1000:1000 data mount

services:
  klangk:
    image: ghcr.io/mcdonc/klangk/klangk-host-custom:latest
    ports:
      - "8995:8995"
    devices:
      - /dev/net/tun
      - /dev/fuse
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
      - label=disable
      - systempaths=unconfined
    cap_add:
      - SYS_ADMIN
    environment:
      # --- Core ---
      KLANGK_NGINX_PORT: "8995"
      KLANGK_PORT: "8997"
      KLANGK_DEFAULT_USER: "admin@example.com"
      KLANGK_DEFAULT_PASSWORD: "admin"
      KLANGK_JWT_SECRET: "${KLANGK_JWT_SECRET}"
      KLANGK_PREVENT_INSECURE_JWT_SECRET: "1"
      KLANGK_DATA_DIR: /home/klangk/data

      # --- Customization directory (runtime, no rebuild) ---
      # Single directory for branding, certs, and email templates.
      # Subdirectories: branding/, certs/, email-templates/
      KLANGK_CUSTOMIZE_DIR: /home/klangk/customize

      # --- Branding (runtime, no rebuild) ---
      # Product name across the tab title, app-bar wordmark, and emails.
      # KLANGK_PRODUCT_NAME: "Acme Labs"
      # Serve the logo from branding/logo.png (place in customize/branding/):
      KLANGK_LOGO_URL: "/branding/logo.png"
      # KLANGK_BRAND_COLOR: "#E65100"

      # --- Legal & support links (runtime, no rebuild) ---
      # KLANGK_TERMS_URL: "https://example.com/terms"
      # KLANGK_PRIVACY_URL: "https://example.com/privacy"
      # KLANGK_AUP_URL: "https://example.com/aup"
      # KLANGK_SUPPORT_URL: "https://example.com/support"
      # KLANGK_SUPPORT_EMAIL: "support@example.com"

      # --- Email customization (runtime, no rebuild) ---
      # Place templates in customize/email-templates/ (see docs)
      # KLANGK_SMTP_REPLY_TO: "support@example.com"
      # KLANGK_SMTP_HOST: "${KLANGK_SMTP_HOST}"
      # KLANGK_SMTP_USER: "${KLANGK_SMTP_USER}"
      # KLANGK_SMTP_PASSWORD: "${KLANGK_SMTP_PASSWORD}"
      # KLANGK_SMTP_FROM: "${KLANGK_SMTP_FROM}"

      # --- Custom CA certs (runtime, no rebuild) ---
      # Trusts every *.pem/*.crt in certs/ for outbound TLS (OIDC, SMTP, LLM).
      KLANGK_SSL_CERT_DIR: /home/klangk/certs

      # --- OIDC (runtime, no rebuild) ---
      # Uncomment to enable. Edit oidc/oidc.yaml with your provider details.
      # KLANGK_OIDC_CONFIG: /home/klangk/oidc/oidc.yaml
      # KLANGK_AUTH_MODES: "both"
      # KLANGK_OIDC_LOGIN_HOOK: /home/klangk/oidc/login_hook.py

      # --- LLM ---
      KLANGK_LLM_BASE_URL: "${KLANGK_LLM_BASE_URL}"
      KLANGK_LLM_API_KEY: "${KLANGK_LLM_API_KEY}"
      KLANGK_LLM_MODEL: "${KLANGK_LLM_MODEL}"

      # --- Observability ---
      LOGFIRE_BASE_URL: "${LOGFIRE_BASE_URL}"
      LOGFIRE_TOKEN: "${LOGFIRE_TOKEN}"
      LOGFIRE_ENVIRONMENT: "${LOGFIRE_ENVIRONMENT}"

      # --- Other ---
      # KLANGK_DISABLE_REGISTRATION: "1"
      # KLANGK_DNS_SERVERS: "100.100.100.100,8.8.8.8"
      KLANGK_ALLOWED_MOUNT_ROOTS: "/home/klangk/mount"

    volumes:
      # Data volume (must exist, owned by 1000:1000):
      - type: bind
        source: ./data
        target: /home/klangk/data
        bind:
          create_host_path: false
      # Mount directory for workspace bind mounts (must exist, owned by 1000:1000):
      - type: bind
        source: ./mount
        target: /home/klangk/mount
        bind:
          create_host_path: false
      # Customization directory — branding/, certs/, email-templates/ subdirs:
      - ./customize:/home/klangk/customize:ro
      # OIDC provider config + login hook (uncomment the env vars above to enable):
      - ./oidc:/home/klangk/oidc:ro
