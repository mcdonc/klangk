name: klangk_plugins
publish_to: none
version: 0.1.0
# Native-capable klangk_plugins aggregator for the macOS-native build. Replaces
# the empty native-plugins-stub: returns the real native-safe plugin set.
# Currently soliplex (conditional-import port). bobdobbs/celebrate are
# native-clean and can be added here; the remaining web-only plugins
# (beep/itstime) await their own conditional-import split (Phase 1).
environment:
  sdk: ^3.6.0
  flutter: ^3.27.0
dependencies:
  flutter:
    sdk: flutter
  klangk_plugin_api:
    git:
      url: https://github.com/mcdonc/klangk-plugin-api.git
  klangk_plugin_soliplex:
    path: ../soliplex
  klangk_plugin_xeyes:
    path: ../xeyes
