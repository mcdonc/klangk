name: "E2E: Frontend Tests"

on:
  workflow_dispatch:
    inputs:
      project:
        description: "Playwright project (chromium|firefox|webkit); blank = all"
        required: false
        default: ""
      grep:
        description: "-g pattern to filter tests; blank = all"
        required: false
        default: ""
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # Chromium + API tests — gates PR merges
  test-frontend-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      KLANGK_LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      KLANGK_LLM_BASE_URL: https://ollama.com/v1
      KLANGK_LLM_MODEL: gemma4:31b
      KLANGK_JWT_SECRET: e2e-test-secret
      KLANGK_DEFAULT_USER: admin@plope.com
      KLANGK_DEFAULT_PASSWORD: admin
      KLANGK_TEST_MODE: "1"
      # Use system podman on Ubuntu runners (nix podman lacks SUID newuidmap)
      KLANGK_PODMAN_BIN: /usr/bin/podman
      KLANGK_PODMAN_STORAGE: /home/runner/.local/share/containers/storage
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            e2e:
              - 'src/backend/**'
              - 'src/frontend/**'
              - 'src/containers/workspace/**'
              - 'plugins/**'
              - 'devenv.nix'
              - 'devenv.yaml'
              - '.github/workflows/frontend-e2e-tests.yml'

      - uses: ./.github/actions/devenv-setup
        if: steps.filter.outputs.e2e == 'true'
        with:
          build-tasks: klangk:build-workspace-image klangk:flutter-build
          cache-nix: "false"

      - name: Run E2E tests (chromium + API)
        if: steps.filter.outputs.e2e == 'true'
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          ARGS=(--project=chromium-api --project=chromium --no-deps)
          if [ -n "${{ inputs.project }}" ]; then ARGS=(--project="${{ inputs.project }}" --no-deps); fi
          if [ -n "${{ inputs.grep }}" ]; then ARGS+=(-g "${{ inputs.grep }}"); fi
          devenv shell -- test-frontend-e2e "${ARGS[@]}"

      - name: Upload test results
        if: always() && steps.filter.outputs.e2e == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results-chromium
          retention-days: 7
          path: |
            src/frontend/e2e-tests/test-results/
            src/frontend/e2e-tests/logs/

      - name: Skip notice
        if: steps.filter.outputs.e2e != 'true'
        run: echo "No code changes — skipping Flutter E2E tests"

  # Firefox + WebKit — runs in parallel, does not gate merges
  test-frontend-e2e-cross-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      KLANGK_LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      KLANGK_LLM_BASE_URL: https://ollama.com/v1
      KLANGK_LLM_MODEL: gemma4:31b
      KLANGK_JWT_SECRET: e2e-test-secret
      KLANGK_DEFAULT_USER: admin@plope.com
      KLANGK_DEFAULT_PASSWORD: admin
      KLANGK_TEST_MODE: "1"
      KLANGK_PODMAN_BIN: /usr/bin/podman
      KLANGK_PODMAN_STORAGE: /home/runner/.local/share/containers/storage
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            e2e:
              - 'src/backend/**'
              - 'src/frontend/**'
              - 'src/containers/workspace/**'
              - 'plugins/**'
              - 'devenv.nix'
              - 'devenv.yaml'
              - '.github/workflows/frontend-e2e-tests.yml'

      - uses: ./.github/actions/devenv-setup
        if: steps.filter.outputs.e2e == 'true'
        with:
          build-tasks: klangk:build-workspace-image klangk:flutter-build
          cache-nix: "false"

      - name: Run E2E tests (firefox + webkit)
        if: steps.filter.outputs.e2e == 'true'
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          devenv shell -- test-frontend-e2e --project=firefox --project=webkit --no-deps

      - name: Upload test results
        if: always() && steps.filter.outputs.e2e == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results-cross-browser
          retention-days: 7
          path: |
            src/frontend/e2e-tests/test-results/
            src/frontend/e2e-tests/logs/

      - name: Skip notice
        if: steps.filter.outputs.e2e != 'true'
        run: echo "No code changes — skipping Flutter E2E tests"
