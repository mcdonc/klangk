name: Flutter E2E Tests

on:
  workflow_dispatch:
    inputs:
      project:
        description: "Playwright project (chromium|firefox|webkit); blank = all"
        required: false
        default: ""
      grep:
        description: "-g pattern to filter tests; blank = all"
        required: false
        default: ""
  pull_request:
    branches: [main]

jobs:
  test-flutter-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      KLANGK_LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      KLANGK_LLM_BASE_URL: https://ollama.com/v1
      KLANGK_LLM_MODEL: gemma4:31b
      KLANGK_JWT_SECRET: e2e-test-secret
      KLANGK_DEFAULT_USER: admin@plope.com
      KLANGK_DEFAULT_PASSWORD: admin
      KLANGK_TEST_MODE: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            e2e:
              - 'src/backend/**'
              - 'src/frontend/**'
              - 'src/docker/**'
              - 'plugins/**'
              - 'scripts/**'
              - 'devenv.nix'
              - '.github/workflows/frontend-e2e-tests.yml'

      - uses: ./.github/actions/devenv-setup
        if: steps.filter.outputs.e2e == 'true'
        with:
          build-tasks: klangk:docker-build klangk:flutter-build

      - name: Run E2E tests
        if: steps.filter.outputs.e2e == 'true'
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          ARGS=()
          if [ -n "${{ inputs.project }}" ]; then ARGS+=(--project="${{ inputs.project }}" --no-deps); fi
          if [ -n "${{ inputs.grep }}" ]; then ARGS+=(-g "${{ inputs.grep }}"); fi
          devenv shell -- test-frontend-e2e "${ARGS[@]}"

      - name: Upload test results
        if: always() && steps.filter.outputs.e2e == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          retention-days: 7
          path: |
            src/frontend/e2e-tests/test-results/
            src/frontend/e2e-tests/logs/

      - name: Skip notice
        if: steps.filter.outputs.e2e != 'true'
        run: echo "No code changes — skipping Flutter E2E tests"
