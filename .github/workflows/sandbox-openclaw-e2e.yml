name: "E2E: openclaw sandbox"

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "sandboxes/openclaw/**"
      - "sandboxes/tests/openclaw/**"
      - ".github/workflows/sandbox-openclaw-e2e.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test-openclaw-sandbox:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      KLANGK_LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      KLANGK_LLM_BASE_URL: https://ollama.com/v1
      KLANGK_LLM_MODEL: gemma4:31b
      # Use system podman on Ubuntu runners (nix podman lacks SUID newuidmap)
      KLANGK_PODMAN_BIN: /usr/bin/podman
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/devenv-setup
        with:
          build-tasks: klangk:build-workspace-image

      - name: Run openclaw sandbox e2e
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          devenv shell -- pytest sandboxes/tests/openclaw -v -p no:xdist --no-cov
