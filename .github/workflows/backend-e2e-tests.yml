name: "E2E: Backend Tests"

on:
  workflow_dispatch:
  push:
    branches: [release/**]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test-backend-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      KLANGK_LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      KLANGK_LLM_BASE_URL: https://ollama.com/v1
      KLANGK_LLM_MODEL: gemma4:31b
      # Use system podman on Ubuntu runners (nix podman lacks SUID newuidmap)
      KLANGK_PODMAN_BIN: /usr/bin/podman
    steps:
      - uses: actions/checkout@v7

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            e2e:
              - 'src/backend/**'
              - 'src/containers/workspace/**'
              - 'devenv.nix'
              - 'devenv.yaml'
              - '.github/workflows/backend-e2e-tests.yml'

      - uses: ./.github/actions/devenv-setup
        if: steps.filter.outputs.e2e == 'true'
        with:
          build-tasks: klangk:build-workspace-image

      - name: Run backend E2E tests
        if: steps.filter.outputs.e2e == 'true'
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          devenv shell -- test-backend-e2e

      - name: Skip notice
        if: steps.filter.outputs.e2e != 'true'
        run: echo "No backend/docker/plugin changes — skipping backend E2E tests"
