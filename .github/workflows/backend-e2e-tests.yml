name: Backend E2E Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test-backend-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      KLANGK_LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      KLANGK_LLM_BASE_URL: https://ollama.com/v1
      KLANGK_LLM_MODEL: gemma4:31b
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            e2e:
              - 'src/backend/**'
              - 'src/containers/workspace/**'
              - 'devenv.nix'
              - 'devenv.yaml'
              - '.github/workflows/backend-e2e-tests.yml'

      - uses: ./.github/actions/devenv-setup
        if: steps.filter.outputs.e2e == 'true'
        with:
          build-tasks: klangk:build-backend-image
          cache-nix: "false"

      - name: Stop devenv services
        if: steps.filter.outputs.e2e == 'true'
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          devenv processes down --no-tui 2>/dev/null || true

      - name: Run backend E2E tests
        if: steps.filter.outputs.e2e == 'true'
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          devenv shell -- test-cli-e2e

      - name: Skip notice
        if: steps.filter.outputs.e2e != 'true'
        run: echo "No backend/docker/plugin changes — skipping backend E2E tests"
