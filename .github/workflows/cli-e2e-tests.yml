name: CLI E2E Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test-cli-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      KLANGK_LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      KLANGK_LLM_BASE_URL: https://ollama.com/v1
      KLANGK_LLM_MODEL: gemma4:31b
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            e2e:
              - 'src/backend/**'
              - 'src/docker/workspace/**'
              - 'devenv.nix'
              - 'devenv.yaml'
              - '.github/workflows/cli-e2e-tests.yml'

      - uses: ./.github/actions/devenv-setup
        if: steps.filter.outputs.e2e == 'true'
        with:
          build-tasks: klangk:docker-build

      - name: Run CLI E2E tests
        if: steps.filter.outputs.e2e == 'true'
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          devenv shell -- test-cli-e2e -k "not TestExec and not TestSync"

      - name: Skip notice
        if: steps.filter.outputs.e2e != 'true'
        run: echo "No backend/docker/plugin changes — skipping CLI E2E tests"
