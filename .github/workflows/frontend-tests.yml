name: Frontend Tests

on:
  workflow_dispatch:
  push:
    branches: [release/**]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            frontend:
              - 'src/frontend/lib/**'
              - 'src/frontend/test/**'
              - 'src/frontend/pubspec.yaml'
              - 'plugins/**/klangk/**'
              - 'scripts/lcov-report.py'
              - '.github/workflows/frontend-tests.yml'

      - uses: subosito/flutter-action@v2
        if: steps.filter.outputs.frontend == 'true'
        with:
          channel: stable
          cache: true

      - name: Create stub klangk_plugins package
        if: steps.filter.outputs.frontend == 'true'
        run: bash scripts/stub_dart_plugins.sh

      - name: Install dependencies
        if: steps.filter.outputs.frontend == 'true'
        working-directory: src/frontend
        run: flutter pub get

      - name: Run tests with coverage
        if: steps.filter.outputs.frontend == 'true'
        working-directory: src/frontend
        run: flutter test --coverage

      - name: Coverage report
        if: steps.filter.outputs.frontend == 'true'
        working-directory: src/frontend
        run: python3 ../../scripts/lcov-report.py coverage/lcov.info

      - name: Run plugin Dart tests
        if: steps.filter.outputs.frontend == 'true'
        run: |
          for pubspec in plugins/*/klangk/pubspec.yaml; do
            dir=$(dirname "$pubspec")
            if [ -d "$dir/test" ]; then
              echo "=== Testing $dir ==="
              cd "$dir"
              flutter pub get
              flutter test
              cd "$GITHUB_WORKSPACE"
            fi
          done

      - name: Skip notice
        if: steps.filter.outputs.frontend != 'true'
        run: echo "No frontend changes — skipping tests"
