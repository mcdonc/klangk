name: Python Tests

on:
  workflow_dispatch:
  push:
    branches: [release/**]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            python:
              - 'src/klangk/**'
              - 'scripts/**'
              - 'plugins/**'
              - 'plugins.yaml'
              - '.github/workflows/backend-tests.yml'

      - uses: actions/setup-python@v6
        if: steps.filter.outputs.python == 'true'
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        if: steps.filter.outputs.python == 'true'
        # One unified distribution (src/klangk) ships the klangk package
        # (server + CLI). The two unit suites share one --cov gate (#1606).
        run: pip install -e src/klangk/

      - name: Run tests
        if: steps.filter.outputs.python == 'true'
        # -n auto: run tests in parallel across CPUs (pytest-xdist)
        run: python -m pytest src/klangk/klangkd-tests/tests src/klangk/klangkc-tests/tests -v -n auto

      - name: Run build-pipeline tests
        if: steps.filter.outputs.python == 'true'
        # Exercises update_plugins.py + import_dart_plugins.py against the
        # real checked-in plugins.yaml + plugins/ — catches build-side
        # regressions the runtime test suite can't see (#1666). No coverage
        # gate here (scripts/ isn't part of the klangk package).
        run: python -m pytest scripts/tests/ -v

      - name: Skip notice
        if: steps.filter.outputs.python != 'true'
        run: echo "No Python package changes — skipping tests"
