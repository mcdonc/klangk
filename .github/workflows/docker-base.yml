name: Build Base Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/containers/workspace/Dockerfile.base"
      - ".github/workflows/docker-base.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build base image
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          CALVER="$(date -u +%Y.%m.%d)"
          VERSION="${CALVER}-${COMMIT}"
          REPO="ghcr.io/${{ github.repository }}/klangk-base"
          docker build --platform linux/amd64 \
            --build-arg KLANGK_UID=1000 \
            --build-arg KLANGK_GID=1000 \
            -f src/containers/workspace/Dockerfile.base \
            -t "$REPO:latest" \
            -t "$REPO:$VERSION" \
            src/containers/workspace/

      - name: Push base image
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          CALVER="$(date -u +%Y.%m.%d)"
          VERSION="${CALVER}-${COMMIT}"
          REPO="ghcr.io/${{ github.repository }}/klangk-base"
          docker push "$REPO:latest"
          docker push "$REPO:$VERSION"
