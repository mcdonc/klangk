name: Build Host Image

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/devenv-setup
        with:
          build-tasks: ""

      - name: Build host image (builds everything from source)
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          devenv shell -- build-host-image

      - name: Push host image to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          COMMIT=$(git rev-parse --short HEAD)
          CALVER="$(date -u +%Y.%m.%d)"
          VERSION="${CALVER}-${COMMIT}"
          REPO="ghcr.io/${{ github.repository }}/klangk-host"
          docker tag klangk-host "$REPO:latest"
          docker tag klangk-host "$REPO:$VERSION"
          docker push "$REPO:latest"
          docker push "$REPO:$VERSION"
