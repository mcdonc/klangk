name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/devenv-setup
        with:
          build-tasks: klangk:build-workspace-image klangk:flutter-build

      - name: Backend tests
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          devenv shell -- test-backend

      - name: Frontend tests
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          devenv shell -- test-frontend

  build-and-release:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      packages: write
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/devenv-setup

      - name: Build host image
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          devenv shell -- build-host-image

      - name: Push images to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          VERSION="${GITHUB_REF_NAME}"

          # Push host image
          HOST_REPO="ghcr.io/${{ github.repository }}/klangk-host"
          docker tag klangk-host "$HOST_REPO:latest"
          docker tag klangk-host "$HOST_REPO:$VERSION"
          docker push "$HOST_REPO:latest"
          docker push "$HOST_REPO:$VERSION"

          # Push workspace image
          WS_REPO="ghcr.io/${{ github.repository }}/klangk-workspace"
          devenv shell -- podman login ghcr.io -u ${{ github.actor }} --password-stdin <<< "${{ secrets.GITHUB_TOKEN }}"
          devenv shell -- podman tag klangk-workspace "$WS_REPO:latest"
          devenv shell -- podman tag klangk-workspace "$WS_REPO:$VERSION"
          devenv shell -- podman push "$WS_REPO:latest"
          devenv shell -- podman push "$WS_REPO:$VERSION"

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
