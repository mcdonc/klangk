name: Release

on:
  push:
    tags:
      - "v[0-9]*"

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      packages: write
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/devenv-setup

      - name: Build host image
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          devenv shell -- build-host-image

      - name: Push images to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          VERSION="${GITHUB_REF_NAME}"

          # Push host image (versioned tag only, no :latest)
          HOST_REPO="ghcr.io/${{ github.repository }}/klangk-host"
          docker tag klangk-host "$HOST_REPO:$VERSION"
          docker push "$HOST_REPO:$VERSION"

          # Push workspace image (versioned tag only, no :latest)
          WS_REPO="ghcr.io/${{ github.repository }}/klangk-workspace"
          devenv shell -- podman login ghcr.io -u ${{ github.actor }} --password-stdin <<< "${{ secrets.GITHUB_TOKEN }}"
          devenv shell -- podman tag klangk-workspace "$WS_REPO:$VERSION"
          devenv shell -- podman push "$WS_REPO:$VERSION"

      - name: Create GitHub Release
        run: |
          # Release body = GitHub's auto-generated notes, with this version's
          # section from docs/changes.md prepended (when present).
          # `gh release create --generate-notes --notes "..."` prepends the
          # --notes content to the auto-generated notes (per `gh release create --help`).
          # docs/changes.md is the source of truth; see it and
          # docs/development/releasing.md.
          VERSION="$GITHUB_REF_NAME"
          SECTION=""
          if [ -f docs/changes.md ]; then
            # Extract the body of the `## [<version>]` section. Matched as a
            # prefix so an optional trailing date (`## [v1.0.5] - 2026-07-07`)
            # still matches. Captured up to the next `## [` heading or EOF.
            SECTION="$(awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "]" { found=1; next }
              found && /^## \[/ { exit }
              found { print }
            ' docs/changes.md)"
          fi
          if [ -n "$SECTION" ]; then
            gh release create "$VERSION" \
              --title "$VERSION" \
              --generate-notes \
              --notes "$SECTION"
          else
            # No changelog section for this version — pure auto-generated notes.
            gh release create "$VERSION" \
              --title "$VERSION" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build + publish the klangk wheel to PyPI via trusted publishing (OIDC,
  # no API token — same shape as the deleted cli-publish.yml pre-#1606).
  # Runs in parallel with build-and-release — the wheel doesn't need
  # podman/docker, and pip/uv users (the #1607 / #1645 first-run audience)
  # get an installable artifact via `pip install klangk==<tag>`. The
  # distribution name is ``klangk`` (one unified wheel ships the klangkd
  # server + klangk CLI, #1606); the tag is ``vX.Y.Z``; hatch-vcs derives
  # the version from it.
  #
  # Pre-#1705 the wheel build + publish lived in this same job; #1705/#1707/
  # #1708 split it into a serial chain through a dist-smoke-test gate. The
  # smoke gate is now its own workflow (.github/workflows/dist-smoke.yml)
  # that does NOT block release — the smoke is a release-engineering tool
  # the release manager runs against a release-candidate branch before
  # tagging, not a CI gate. Releases publish without waiting on the smoke
  # so the pipeline isn't held hostage to the smoke being green (it's
  # currently red on #1709, a klangkd caddy bug, not a wheel-packaging
  # bug). Run dist-smoke.yml manually before tagging to validate a
  # release candidate.
  #
  # Trusted-publishing prereq (PyPI side, one-time): the `klangk` PyPI
  # project must have a trusted publisher configured for this repo +
  # workflow + environment (mcdonc/klangk, .github/workflows/release.yml,
  # environment name: pypi). With that in place PyPI validates the OIDC
  # token from GitHub Actions and publishes with no secret on our side.
  build-wheel:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: pypi # PyPI trusted publisher binds to this environment name
    permissions:
      id-token: write # OIDC attestation — the only permission trusted publishing needs
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # hatch-vcs needs full history to derive the version

      - uses: ./.github/actions/devenv-setup
        with:
          # Build the frontend with the default plugin set (checked-in
          # plugins.yaml, #1660) so the wheel's klangk/frontend/ carries
          # the compiled UI + features.json. The hatch build hook
          # (hatch_build_frontend.py) force-includes it and *requires* it
          # for non-editable wheel builds (#1600).
          build-tasks: klangk:flutter-build

      - name: Build wheel
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          # scripts/build_wheel.sh installs python-build transiently (uv-sync
          # at shell entry would wipe it; the script installs + builds in one
          # process). Requires the frontend artifact from klangk:flutter-build
          # above — the hatch build hook force-includes it and requires it for
          # non-editable wheel builds (#1600).
          devenv shell -- bash scripts/build_wheel.sh

      - name: Publish to PyPI
        # Trusted publishing (OIDC) — no API token. pypa/gh-action-pypi-publish
        # negotiates an OIDC token from GitHub Actions and presents it to
        # PyPI, which validates it against the trusted-publisher config on
        # the `klangk` project (environment: pypi, workflow: release.yml).
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: src/klangk/dist
          skip-existing: true # idempotent on re-runs of the same tag
