name: Build Workspace Base Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/containers/workspace/Dockerfile.base"
      - ".github/workflows/image-workspace-base.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push base image
        id: build
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          CALVER="$(date -u +%Y.%m.%d)"
          VERSION="${CALVER}-${COMMIT}"
          REPO="ghcr.io/${{ github.repository }}/klangk-workspace-base"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f src/containers/workspace/Dockerfile.base \
            -t "$REPO:$VERSION" \
            --push \
            src/containers/workspace/
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image=$REPO:$VERSION" >> "$GITHUB_OUTPUT"

      - name: Open PR to update workspace base image pin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.build.outputs.version }}"
          IMAGE="${{ steps.build.outputs.image }}"
          BRANCH="auto/bump-workspace-base-${VERSION}"

          git checkout -b "$BRANCH"
          sed -i "s|^ARG WORKSPACE_BASE_IMAGE=.*|ARG WORKSPACE_BASE_IMAGE=${IMAGE}|" \
            src/containers/workspace/Dockerfile
          git add src/containers/workspace/Dockerfile
          git -c user.name="github-actions[bot]" \
              -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -m "build: bump workspace base image to ${VERSION} [skip ci]"
          git push origin "$BRANCH"
          gh pr create \
            --title "Bump workspace base image to ${VERSION}" \
            --body "Auto-generated by the workspace base image build workflow.

          Updates the pinned base image in \`src/containers/workspace/Dockerfile\` to \`${IMAGE}\`."
