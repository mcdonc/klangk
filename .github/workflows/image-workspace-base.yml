name: Build Workspace Base Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/containers/workspace/Dockerfile.base"
      - ".github/workflows/image-workspace-base.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push base image
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          CALVER="$(date -u +%Y.%m.%d)"
          VERSION="${CALVER}-${COMMIT}"
          REPO="ghcr.io/${{ github.repository }}/klangk-workspace-base"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f src/containers/workspace/Dockerfile.base \
            -t "$REPO:$VERSION" \
            --push \
            src/containers/workspace/
          echo "Pushed $REPO:$VERSION"
          echo "Update src/containers/workspace/Dockerfile ARG to use this tag."
