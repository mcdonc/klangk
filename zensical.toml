[project]
site_name = "Klangk"
site_description = "Multi-User AI Sandboxing, Collaboration and Coding Platform"
site_author = "Chris McDonough"
site_url = "https://mcdonc.github.io/klangk/"
repo_url = "https://github.com/mcdonc/klangk"
repo_name = "mcdonc/klangk"
copyright = "Copyright &copy; 2026 Chris McDonough"
extra_css = ["stylesheets/extra.css"]

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "Features" = [
    { "Overview" = "features/index.md" },
    { "Authentication" = "features/authentication.md" },
    { "Authorization" = "features/authorization.md" },
    { "Handles" = "features/handles.md" },
    { "Admin Management" = "features/admin-management.md" },
    { "Invitations" = "features/invitations.md" },
    { "Workspaces" = "features/workspaces.md" },
    { "Terminal" = "features/terminal.md" },
    { "The Shell" = "features/the-shell.md" },
    { "Service Command" = "features/service-command.md" },
    { "Auto-Start" = "features/auto-start.md" },
    { "Health Check" = "features/health-check.md" },
    { "Sandbox" = "features/sandbox.md" },
    { "Chat" = "features/chat.md" },
    { "File Viewer" = "features/file-viewer.md" },
    { "AI Coding Harnesses" = "features/ai-coding-harnesses.md" },
    { "Using Plugins" = "features/plugins.md" },
    { "Export & Import" = "features/export-import.md" },
    { "Hosted Apps" = "features/hosted-apps.md" },
    { "CLI" = "reference/cli.md" },
    { "SSH Agent Forwarding" = "features/ssh-agent-forwarding.md" },
    { "GitHub HTTPS Authentication" = "features/github-authentication.md" },
    { "Debug Panel" = "features/debug-panel.md" },
  ]},
  { "Sandboxes" = [
    { "Overview" = "sandboxes/index.md" },
    { "OpenClaw" = "sandboxes/openclaw.md" },
    { "Hermes" = "sandboxes/hermes.md" },
  ]},
  { "Deployment" = [
    { "Running with Docker" = "deployment/docker.md" },
    { "Hosting & Nginx" = "deployment/hosting.md" },
    { "Customizing" = "deployment/customizing.md" },
    { "Process Signals" = "deployment/signals.md" },
    { "Podman" = "reference/podman.md" },
    { "OIDC" = "reference/oidc.md" },
  ]},
  { "Reference" = [
    { "ACL System" = "reference/acl.md" },
    { "API Endpoints" = "reference/api-endpoints.md" },
    { "Environment Variables" = "reference/environment.md" },
  ]},
  { "Klangk Development" = [
    { "Overview" = "development/index.md" },
    { "CI" = "development/ci.md" },
    { "Pre-commit Hooks" = "development/pre-commit.md" },
    { "Releasing" = "development/releasing.md" },
    { "Building Images" = "development/building-images.md" },
    { "Creating Plugins" = "development/creating-plugins.md" },
    { "Stable Branches" = "development/stable-branches.md" },
  ]},
  { "Changelog" = "changes.md" },
  { "Architecture" = [
    { "Overview" = "architecture/index.md" },
    { "LLM Proxy" = "architecture/llm-proxy.md" },
    { "Browser Bridge" = "architecture/browser-bridge.md" },
    { "Workspace JWT" = "architecture/workspace-jwt.md" },
  ]},
]

[project.theme]
logo = "assets/logo.svg"
favicon = "assets/favicon.png"
language = "en"
features = [
    "content.code.copy",
    "content.code.select",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "slate"
primary = "green"
accent = "green"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "green"
accent = "green"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.details]
