[project]
site_name = "Klangk"
site_description = "Multi-User AI Collaboration and Coding Platform"
site_author = "Chris McDonough"
site_url = "https://mcdonc.github.io/klangk/"
copyright = "Copyright &copy; 2026 Chris McDonough"
extra_css = ["stylesheets/extra.css"]

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "Architecture" = [
    { "Overview" = "architecture/index.md" },
    { "LLM Proxy" = "architecture/llm-proxy.md" },
    { "Browser Bridge" = "architecture/browser-bridge.md" },
    { "Workspace JWT" = "architecture/workspace-jwt.md" },
  ]},
  { "Features" = [
    { "Overview" = "features/index.md" },
    { "Authentication" = "features/authentication.md" },
    { "Workspaces" = "features/workspaces.md" },
    { "Terminal" = "features/terminal.md" },
    { "Chat" = "features/chat.md" },
    { "File Viewer" = "features/file-viewer.md" },
    { "GitHub Authentication" = "features/github-authentication.md" },
    { "AI Coding Harnesses" = "features/ai-coding-harnesses.md" },
    { "Plugins & Extensions" = "features/plugins.md" },
    { "Export & Import" = "features/export-import.md" },
  ]},
  { "Development" = [
    { "Overview" = "development/index.md" },
    { "CI" = "development/ci.md" },
    { "Pre-commit Hooks" = "development/pre-commit.md" },
    { "Releasing" = "development/releasing.md" },
    { "Stable Branches" = "development/stable-branches.md" },
  ]},
  { "Deployment" = [
    { "Host Container" = "deployment/index.md" },
    { "Hosting & Nginx" = "deployment/hosting.md" },
    { "Customizing" = "deployment/customizing.md" },
  ]},
  { "Reference" = [
    { "ACL System" = "reference/acl.md" },
    { "CLI" = "reference/cli.md" },
    { "Environment Variables" = "reference/environment.md" },
    { "OIDC" = "reference/oidc.md" },
    { "Podman" = "reference/podman.md" },
    { "Plugin System" = "reference/plugin-system.md" },
  ]},
]

[project.theme]
logo = "assets/logo.svg"
favicon = "assets/favicon.png"
language = "en"
features = [
    "content.code.copy",
    "content.code.select",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "slate"
primary = "green"
accent = "green"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "green"
accent = "green"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.details]
