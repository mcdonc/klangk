name: klangk_plugin_soliplex
description: Soliplex knowledge base plugin for Klangk (native + web)
publish_to: none
version: 0.2.0

# Native-capable port of the web-only soliplex klangk plugin. The two
# browser-only concerns — token storage and interactive login — live behind a
# conditional import (soliplex_platform.dart): localStorage + popup on web,
# flutter_secure_storage + flutter_appauth on native. plugin.dart and
# soliplex_tools.dart no longer import dart:js_interop / package:web directly.
environment:
  sdk: ^3.6.0
  flutter: ^3.27.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  # Used to set a multipart file part's Content-Type when uploading files
  # (MediaType). It is already a transitive dep of `http`; declared directly
  # because soliplex_tools.dart imports it.
  http_parser: ^4.0.0
  # Web-only token store + popup login (imported solely by *_web.dart, which
  # the native build tree-shakes via the conditional export).
  web: ^1.1.0
  # Native token store (NSUserDefaults via shared_preferences — no Keychain
  # entitlement needed in the sandbox) + system-browser PKCE login.
  shared_preferences: ^2.3.0
  flutter_appauth: ^12.0.0
  # Streaming AG-UI client (replaces hand-rolled SSE buffering in queryRoom)
  # plus soliplex_agent for the ThreadKey (serverId, roomId, threadId) record
  # that uniquely identifies a conversation across servers (multi-server).
  #
  # Both are sibling packages in the frontend repo and MUST be pinned to the
  # SAME commit: soliplex_agent references soliplex_client at its own checkout
  # commit, so a `ref: main` mismatch is a diamond conflict. Pinning unifies
  # them with no dependency_overrides — which matters because a plugin's own
  # overrides are ignored when klangk consumes it as a path dependency (only
  # the frontend root's overrides apply, and klangk does not propagate ours).
  soliplex_client:
    git:
      url: https://github.com/soliplex/frontend.git
      ref: ac263d27bb0abcf94ea970d2666fde8774195986
      path: packages/soliplex_client
  soliplex_agent:
    git:
      url: https://github.com/soliplex/frontend.git
      ref: ac263d27bb0abcf94ea970d2666fde8774195986
      path: packages/soliplex_agent
  # Streaming tool-handler API (StreamingToolHandler / ToolChunkSink /
  # ToolPlugin.streamingHandlers) landed upstream in klangk-plugin-api#1, so
  # this resolves against klangk main with no override — see README.
  klangk_plugin_api:
    git:
      url: https://github.com/mcdonc/klangk-plugin-api.git
      ref: v0.2.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  # Default-server config baked into the plugin build. Consumed via
  # rootBundle as packages/klangk_plugin_soliplex/assets/soliplex_config.json.
  assets:
    - assets/soliplex_config.json
