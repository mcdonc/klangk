name: klangk_frontend
description: Klangk - Web Coding Agent
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.6.0
  flutter: ^3.27.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.0
  xterm: ^4.0.0
  # XXX: This is because nix MacOS does not support Flutter 3.44 - yet.
  # flterm: vendored in libghostty as packages/flterm, patched to build on
  # Flutter 3.41 / Dart 3.11 (upstream 0.0.3 needs Dart 3.12 for private-named
  # parameters; the patch removes that usage), so no host Flutter is required --
  # builds with the nix toolchain. Consumed from libghostty (the standalone
  # runyaga/flterm fork is archived).
  flterm:
    git:
      url: https://github.com/runyaga/libghostty.git
      ref: "0.0.3.2"
      path: packages/flterm
  libghostty: ^0.0.9
  web_socket_channel: ^3.0.0
  http: ^1.2.0
  provider: ^6.1.0
  shared_preferences: ^2.3.0
  desktop_drop: ^0.7.1
  go_router: ^17.2.3
  flutter_markdown_plus: ^1.0.7
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  klangk_plugin_api:
    git:
      url: https://github.com/mcdonc/klangk-plugin-api.git
  # Path set by import_plugins.py — do not edit this line
  klangk_plugins:
    path: PLACEHOLDER
  code_forge_web: ^2.10.0
  pdfrx: ^2.4.3
  video_player: ^2.9.0
  flutter_riverpod: ^2.4.9
  sheetifye:
    git:
      url: https://github.com/runyaga/sheetifye.git
      ref: klangk-compat

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  video_player_platform_interface: ^6.2.0
  plugin_platform_interface: ^2.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/libghostty-wasm32-freestanding.wasm

  fonts:
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
    - family: Noto Emoji
      fonts:
        - asset: assets/fonts/NotoEmoji-Regular.ttf
