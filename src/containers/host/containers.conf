# Podman engine config for the rootless-in-a-container daemon
# (docs/DOCKER-COMPOSE.md). Used only by the compose image
# (Dockerfile.compose); the devenv/host-process flow uses the host's own
# podman config and ignores this file.

[containers]
# slirp4netns/pasta is the only networking available rootless-in-a-container.
netns = "private"
# Podman sets net.ipv4.ping_group_range on every container by default; the
# outer engine mounts /proc/sys read-only, so that write fails ("Read-only file
# system"). Rather than relaxing the outer container's /proc (docker's
# `systempaths=unconfined` / podman's `unmask=ALL` — engine-specific), we stop
# the inner podman from writing the sysctl at all. Engine-portable. Trade-off:
# inner workspace containers won't have ping_group_range set (harmless here).
default_sysctls = []

[engine]
# No systemd/journald inside the container -> manage cgroups directly, log
# events to a file, and run crun (low-footprint, cgroup-v2 friendly).
cgroup_manager = "cgroupfs"
events_logger = "file"
runtime = "crun"
# Init binary for `podman --init` (workspace containers set Init=True).
init_path = "/usr/bin/catatonit"
