name: klangk_plugins
publish_to: none
version: 0.0.1
# Native-safe stand-in for the devenv-generated klangk_plugins aggregator.
# The real bundle pulls in beep/celebrate/soliplex, which import
# `dart:js_interop` / `package:web` unconditionally and cannot compile for a
# desktop (non-web) target. Until those plugins gain conditional-import guards,
# the native build uses this empty aggregator so the rest of the app can run.
environment:
  sdk: ^3.6.0
  flutter: ^3.27.0
dependencies:
  flutter:
    sdk: flutter
  klangk_plugin_api:
    git:
      url: https://github.com/mcdonc/klangk-plugin-api.git
